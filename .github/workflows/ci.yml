name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check aegis_gov/ tests/

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Coverage
        if: matrix.python-version == '3.11'
        run: pytest tests/ --cov=aegis_gov --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -e ".[dev]" pip-audit detect-secrets

      - name: Dependency audit
        run: pip-audit

      - name: Secret scan
        run: detect-secrets scan --all-files --exclude-files '\.git/.*' --force-use-all-plugins
